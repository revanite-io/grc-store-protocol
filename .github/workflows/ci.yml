name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # The declared go.mod floor AND a recent toolchain — a zero-dependency
        # contract module must build on the minimum it advertises.
        go: ['1.22', '1.26']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)" || { echo 'gofmt:'; gofmt -l .; exit 1; }
      - run: go mod tidy && git diff --exit-code go.mod go.sum
      - run: go test ./... -count=1
