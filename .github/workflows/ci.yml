name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # The declared go.mod floor AND a recent toolchain — a zero-dependency
        # contract module must build on the minimum it advertises.
        go: ['1.22', '1.26']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)" || { echo 'gofmt:'; gofmt -l .; exit 1; }
      - name: tidy + enforce zero dependencies
        # This module is dependency-free by design (contract, not client). go mod
        # tidy must be a no-op; if it writes go.mod or creates a go.sum, a
        # dependency snuck in. Uses git status (not `git diff <path>`, which
        # fatals on a not-yet-existing go.sum).
        run: |
          go mod tidy
          changed="$(git status --porcelain go.mod go.sum)"
          if [ -n "$changed" ]; then
            echo "::error::go.mod/go.sum changed by 'go mod tidy' — this module must stay dependency-free:"
            echo "$changed"
            exit 1
          fi
      - run: go test ./... -count=1
